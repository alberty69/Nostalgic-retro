<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nostalgic Retro - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanlines"></div>
    <header>
        <h1 class="logo glow-neon-pink"><a href="index.html" style="text-decoration:none; color:inherit;">NOSTALGIC RETRO</a></h1>
        <nav>
            <a href="index.html">Jogos</a>
            <a href="premium.html" class="glow-neon-yellow">Premium</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2 class="glow-neon-green">INSERT COIN TO PLAY</h2>
            <div class="terminal-box">
                <p>--- TERMINAL DO JOGADOR ---</p>
                <div class="input-group">
                    <input type="text" id="nomeUsuario" placeholder="NOME (P1)">
                    <button class="btn-retro btn-green" onclick="gerarMensagem()">OK</button>
                </div>
                <p id="resultado" class="blink"></p>
            </div>
        </section>

        <section class="catalog-section">
            <div class="games-grid">
                <!-- Exemplo de 1 jogo. Você pode copiar este bloco para outros -->
                <div class="game-card" onclick="window.location.href='detalhes.html?jogo=mario'">
                    <div class="game-cover" style="background-color: #e0115f;"><span>MARIO</span></div>
                    <h3 class="game-title">Super Mario World</h3>
                    <span class="game-category">Nintendo • Plataforma</span>
                </div>

                <div class="game-card" onclick="window.location.href='detalhes.html?jogo=sonic'">
                    <div class="game-cover" style="background-color: #0000ff;"><span>SONIC</span></div>
                    <h3 class="game-title">Sonic The Hedgehog</h3>
                    <span class="game-category">SEGA • Ação</span>
                </div>
                <!-- Repita o bloco acima para mais jogos -->
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
