<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostalgic Retro - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanlines"></div>

    <header>
        <h1 class="logo glow-neon-pink"><a href="index.html" style="text-decoration:none; color:inherit;">NOSTALGIC RETRO</a></h1>
        <nav>
            <a href="index.html">Jogos</a>
            <a href="premium.html" class="glow-neon-yellow">Premium</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2 class="glow-neon-green">INSERT COIN TO PLAY</h2>
            <div class="terminal-box">
                <p>--- TERMINAL DO JOGADOR ---</p>
                <div class="input-group">
                    <input type="text" id="nomeUsuario" placeholder="NOME (P1)">
                    <button class="btn-retro btn-green" onclick="gerarMensagem()">OK</button>
                </div>
                <p id="resultado" class="blink"></p>
            </div>
        </section>

        <section class="catalog-section">
            <h2 class="section-title">CATÁLOGO DE JOGOS</h2>
            <div class="games-grid" id="main-grid">
                </div>
        </section>
    </main>

    <footer><p>© 2026 NOSTALGIC RETRO</p></footer>
    <script src="script.js"></script>
</body>
</html>
