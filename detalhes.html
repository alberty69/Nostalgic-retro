<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostalgic Retro - Detalhes</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanlines"></div>

    <header>
        <h1 class="logo glow-neon-pink"><a href="index.html">NOSTALGIC RETRO</a></h1>
        <nav>
            <a href="index.html">Jogos</a>
            <a href="premium.html" class="glow-neon-yellow">Premium</a>
        </nav>
    </header>

    <main>
        <section class="game-details-preview">
            <a href="index.html" class="btn-retro btn-green" style="margin-bottom: 30px; text-decoration:none; display:inline-block;">⬅ VOLTAR</a>
            
            <div class="details-container">
                <div class="details-left">
                    <div id="game-cover" class="big-cover">GAME</div>
                </div>
                <div class="details-right">
                    <h2 id="game-title" class="glow-neon-yellow">Carregando...</h2>
                    <p id="game-desc" class="desc">Buscando dados no sistema...</p>
                    <div class="actions">
                        <button class="btn-retro btn-pink" onclick="alert('Iniciando anúncio 1 de 3...')">📺 VER ANÚNCIOS</button>
                        <a href="premium.html" class="btn-retro btn-yellow" style="text-decoration:none;">⭐ ASSINAR PREMIUM</a>
                    </div>
                </div>
            </div>
        </section>

        <section class="suggestions-section">
            <h2 class="section-title glow-neon-blue">JOGOS PARECIDOS</h2>
            <div class="games-grid" id="recommendations-grid">
                </div>
        </section>
    </main>

    <footer><p>© 2026 NOSTALGIC RETRO</p></footer>
    <script src="script.js"></script>
</body>
</html>
