<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nostalgic Retro - Detalhes</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanlines"></div>
    <header>
        <h1 class="logo glow-neon-pink"><a href="index.html" style="text-decoration:none; color:inherit;">NOSTALGIC RETRO</a></h1>
    </header>

    <main>
        <section class="game-details-preview">
            <a href="index.html" class="btn-retro btn-green" style="display:inline-block; margin-bottom:20px; text-decoration:none;">⬅ VOLTAR</a>
            
            <div class="details-container">
                <div class="details-left">
                    <div id="game-cover" class="big-cover">GAME</div>
                </div>
                <div class="details-right">
                    <h2 id="game-title" class="glow-neon-yellow">Carregando...</h2>
                    <p id="game-desc" class="desc">Aguarde enquanto carregamos os dados do jogo.</p>
                    <div class="actions">
                        <button class="btn-retro btn-pink" onclick="alert('Iniciando anúncio 1 de 3...')">📺 Ver Anúncios</button>
                        <a href="premium.html" class="btn-retro btn-yellow" style="text-decoration:none;">⭐ ASSINAR PREMIUM</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
