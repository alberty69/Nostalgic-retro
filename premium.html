<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nostalgic Retro - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanlines"></div>
    <header>
        <h1 class="logo glow-neon-pink"><a href="index.html" style="text-decoration:none; color:inherit;">NOSTALGIC RETRO</a></h1>
    </header>

    <main>
        <section class="subscription-section">
            <h2 class="section-title glow-neon-pink">ESCOLHA SEU PLANO</h2>
            <div class="plans-container">
                <div class="plan-card">
                    <h3>MENSAL</h3>
                    <div class="price">R$ 19,90</div>
                    <ul>
                        <li>Sem Anúncios</li>
                        <li>Saves Ilimitados</li>
                    </ul>
                    <button class="btn-retro btn-green">ASSINAR</button>
                </div>
                <div class="plan-card highlight">
                    <h3>ANUAL</h3>
                    <div class="price">R$ 14,90<span>/mês</span></div>
                    <button class="btn-retro btn-yellow">ASSINAR</button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
